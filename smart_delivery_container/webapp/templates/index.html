<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raspberry Pi Camera + 로드셀</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f; color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 16px; min-height: 100vh;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 14px; border-bottom: 1px solid #222; margin-bottom: 16px;
    }
    h1 { font-size: 1.1rem; font-weight: 600; }

    .badges { display: flex; gap: 8px; }
    .badge {
      display: flex; align-items: center; gap: 6px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      padding: 4px 11px; border-radius: 20px; font-size: 0.75rem;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #444; transition: background 0.4s; }
    .dot.on  { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }
    .dot.off { background: #ef4444; }
    .dot.warn { background: #f59e0b; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto auto auto;
      gap: 14px;
      max-width: 1100px; margin: 0 auto;
    }

    .card {
      background: #1a1a1a; border: 1px solid #252525;
      border-radius: 12px; overflow: hidden;
    }
    .card-title {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: #555; padding: 10px 14px 0;
    }

    /* 카메라 */
    .cam-card { grid-row: 1 / 4; }
    .cam-card img { width: 100%; display: block; min-height: 240px; background: #111; }

    /* 무게 게이지 */
    .weight-card { padding: 16px; }
    .weight-big {
      font-size: 3rem; font-weight: 700; font-family: monospace;
      color: #e0e0e0; text-align: center; margin: 8px 0;
      transition: color 0.3s;
    }
    .weight-big.alert { color: #ef4444; }
    .sub-metrics {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin: 10px 0 12px;
    }
    .metric {
      background: #111; border: 1px solid #242424; border-radius: 8px;
      padding: 8px 10px; min-width: 0;
    }
    .metric-label {
      color: #666; font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 4px;
    }
    .metric-value { color: #ddd; font: 600 0.9rem monospace; overflow-wrap: anywhere; }

    .bar-wrap {
      background: #111; border-radius: 6px; height: 10px;
      overflow: hidden; margin: 6px 0 12px;
    }
    .bar-fill {
      height: 100%; background: #22c55e; border-radius: 6px;
      transition: width 0.2s, background 0.3s; width: 0%;
    }
    .bar-fill.alert { background: #ef4444; }

    .threshold-row {
      display: flex; align-items: center; gap: 8px; font-size: 0.8rem;
      color: #888; margin-bottom: 10px;
    }
    .threshold-row input[type=range] { flex: 1; accent-color: #6366f1; }
    #thresholdVal { min-width: 46px; text-align: right; color: #ccc; }

    .btn-row { display: flex; gap: 8px; margin-top: 6px; }
    button {
      flex: 1; background: #222; color: #ccc; border: 1px solid #333;
      padding: 7px 0; border-radius: 8px; cursor: pointer; font-size: 0.82rem;
      transition: background 0.15s;
    }
    button:hover { background: #2e2e2e; color: #fff; }
    button.primary { background: #1e3a5f; border-color: #2563eb; color: #93c5fd; }
    button.primary:hover { background: #1e40af; }

    /* 트리거 알림 */
    .trigger-banner {
      display: none; background: #7f1d1d; border: 1px solid #991b1b;
      border-radius: 8px; padding: 8px 14px; font-size: 0.82rem;
      color: #fca5a5; margin-top: 10px; text-align: center;
    }
    .trigger-banner.show { display: block; }

    /* 캡처 이력 */
    .history-card { padding: 12px 14px; }
    .history-card .card-title { padding: 0 0 8px; }
    .snap-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
    .snap-item {
      display: flex; align-items: center; gap: 10px;
      background: #111; border-radius: 8px; padding: 6px 8px;
      font-size: 0.78rem; color: #888;
    }
    .snap-item img {
      width: 60px; height: 45px; object-fit: cover;
      border-radius: 5px; background: #0a0a0a; flex-shrink: 0;
    }
    .snap-meta { flex: 1; overflow: hidden; }
    .snap-weight { font-size: 0.9rem; color: #ddd; font-weight: 600; }
    .snap-time { color: #555; }
    .snap-empty { color: #444; font-size: 0.8rem; text-align: center; padding: 20px; }

    /* 설정 카드 */
    .settings-card { padding: 14px; }
    .settings-card .card-title { padding: 0 0 10px; }
    .setting-row { margin-bottom: 12px; }
    .setting-label {
      font-size: 0.75rem; color: #888; margin-bottom: 5px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .setting-label span { color: #ccc; font-family: monospace; }
    textarea.setting-input {
      width: 100%; background: #111; border: 1px solid #2a2a2a;
      border-radius: 7px; color: #ddd; font-size: 0.82rem;
      padding: 7px 10px; resize: vertical; min-height: 64px;
      font-family: inherit;
    }
    textarea.setting-input:focus { outline: none; border-color: #6366f1; }

    /* 초음파 */
    .ultra-card { padding: 12px 14px; }
    .ultra-card .card-title { padding: 0 0 8px; }
    .distance-row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 10px; margin-bottom: 10px;
    }
    .distance-big { font: 700 1.6rem monospace; color: #ddd; }
    .distance-big.near { color: #f59e0b; }
    .ultra-log {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 152px; overflow-y: auto;
    }
    .ultra-item {
      display: grid; grid-template-columns: 58px 1fr auto; gap: 8px;
      align-items: center; background: #111; border-radius: 7px;
      padding: 6px 8px; font-size: 0.76rem; color: #888;
    }
    .ultra-dist { color: #ddd; font-family: monospace; }
    .ultra-note { color: #777; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ultra-state { color: #555; }
    .ultra-state.near { color: #f59e0b; }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .cam-card { grid-row: auto; }
      header { align-items: flex-start; flex-direction: column; gap: 10px; }
      .badges { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <h1>Raspberry Pi Camera + 로드셀 모니터</h1>
  <div class="badges">
    <div class="badge"><div class="dot" id="camDot"></div><span id="camTxt">카메라</span></div>
    <div class="badge"><div class="dot" id="hxDot"></div><span id="hxTxt">로드셀</span></div>
    <div class="badge"><div class="dot" id="ultraDot"></div><span id="ultraTxt">초음파</span></div>
    <div class="badge"><div class="dot" id="telegramDot"></div><span id="telegramTxt">텔레그램</span></div>
  </div>
</header>

<div class="grid">

  <!-- 카메라 스트림 -->
  <div class="card cam-card">
    <div class="card-title">라이브 스트림</div>
    <img id="streamImg" src="/stream" alt="stream"
         onerror="this.style.opacity='0.3'" onload="this.style.opacity='1'">
  </div>

  <!-- 무게 게이지 -->
  <div class="card weight-card">
    <div class="card-title">무게</div>
    <div class="weight-big" id="weightVal">-- g</div>
    <div class="sub-metrics">
      <div class="metric">
        <div class="metric-label">5초 평균</div>
        <div class="metric-value" id="avgWeightVal">-- g</div>
      </div>
      <div class="metric">
        <div class="metric-label">원본</div>
        <div class="metric-value" id="rawWeightVal">-- g</div>
      </div>
      <div class="metric">
        <div class="metric-label">후보</div>
        <div class="metric-value" id="pendingWeightVal">--</div>
      </div>
      <div class="metric">
        <div class="metric-label">알림</div>
        <div class="metric-value" id="telegramVal">--</div>
      </div>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="weightBar"></div></div>

    <div class="threshold-row">
      <span>임계값</span>
      <input type="range" id="thresholdSlider" min="0" max="5000" value="500"
             oninput="updateThresholdLabel(this.value)">
      <span id="thresholdVal">500 g</span>
    </div>

    <div class="btn-row">
      <button onclick="tare()">영점 (Tare)</button>
      <button onclick="applyThreshold()" class="primary">임계값 적용</button>
    </div>
    <div class="btn-row" style="margin-top:6px">
      <button onclick="snapshotNow()">지금 스냅샷</button>
    </div>

    <div class="trigger-banner" id="triggerBanner">
      5초 평균 임계값 초과 — 스냅샷 캡처됨
    </div>
  </div>

  <!-- 초음파 로그 -->
  <div class="card ultra-card">
    <div class="card-title">초음파</div>
    <div class="distance-row">
      <div class="distance-big" id="distanceVal">-- cm</div>
      <div class="ultra-state" id="proximityTxt">대기</div>
    </div>
    <div class="ultra-log" id="ultraLog">
      <div class="snap-empty">아직 로그 없음</div>
    </div>
  </div>

  <!-- 영상/메시지 설정 -->
  <div class="card settings-card">
    <div class="card-title">알림 설정</div>

    <div class="setting-row">
      <div class="setting-label">
        이전 영상 길이
        <span id="preSecondsVal">30 초</span>
      </div>
      <input type="range" id="preSecondsSlider" min="1" max="60" value="30"
             style="width:100%;accent-color:#6366f1"
             oninput="document.getElementById('preSecondsVal').textContent=this.value+' 초'">
    </div>

    <div class="setting-row">
      <div class="setting-label">텔레그램 추가 메시지</div>
      <textarea class="setting-input" id="customMsg"
                placeholder="예) 1층 택배함 — 이 메시지가 알림 맨 위에 추가됩니다"></textarea>
    </div>

    <div class="btn-row">
      <button onclick="saveSettings()" class="primary">저장</button>
    </div>
  </div>

  <!-- 캡처 이력 -->
  <div class="card history-card">
    <div class="card-title">자동 캡처 이력</div>
    <div class="snap-list" id="snapList">
      <div class="snap-empty">아직 캡처 없음</div>
    </div>
  </div>

</div>

<script>
  let lastThreshold = 500;
  let triggerTimer = null;

  // ── SSE 무게 스트림 ──────────────────────────────────────
  const sse = new EventSource('/weight-stream');
  sse.onmessage = (e) => {
    const d = JSON.parse(e.data);
    updateWeight(d);
    updateStatus(d.hx_ready, d.ultrasonic_ready, d.telegram_enabled, d.error);
    updateUltrasonic(d.distance_cm, d.proximity, d.ultrasonic_logs);
    if (d.snapshots && d.snapshots.length) renderSnaps(d.snapshots);
    if (d.triggered) showTrigger();
  };

  function formatG(v) {
    if (typeof v !== 'number') return '-- g';
    return (v >= 0 ? '+' : '') + v.toFixed(1) + ' g';
  }

  function updateWeight(d) {
    const el = document.getElementById('weightVal');
    const avgEl = document.getElementById('avgWeightVal');
    const rawEl = document.getElementById('rawWeightVal');
    const pendingEl = document.getElementById('pendingWeightVal');
    const telegramEl = document.getElementById('telegramVal');
    const bar = document.getElementById('weightBar');
    const w = d.weight;
    const avg = d.avg_weight;
    const raw = d.raw_weight;
    const threshold = d.threshold;
    el.textContent = formatG(w);
    avgEl.textContent = formatG(avg);
    rawEl.textContent = d.last_auto_tare_time ? formatG(raw) + ` / tare ${d.last_auto_tare_time}` : formatG(raw);
    pendingEl.textContent = typeof d.pending_weight === 'number'
      ? `${formatG(d.pending_weight)} / ${d.pending_seconds.toFixed(1)}s`
      : '--';
    telegramEl.textContent = d.last_telegram_time ? `sent ${d.last_telegram_time}` : (d.telegram_enabled ? 'ready' : 'off');
    const pct = threshold > 0 ? Math.min(100, Math.max(0, (Math.abs(avg) / threshold) * 100)) : 0;
    bar.style.width = pct + '%';
    const alert = Math.abs(avg) >= threshold;
    el.classList.toggle('alert', alert);
    bar.classList.toggle('alert', alert);
  }

  function updateStatus(hxReady, ultraReady, telegramEnabled, error) {
    const dot = document.getElementById('hxDot');
    const txt = document.getElementById('hxTxt');
    if (error) { dot.className = 'dot warn'; txt.textContent = '오류'; }
    else if (hxReady) { dot.className = 'dot on'; txt.textContent = '로드셀'; }
    else { dot.className = 'dot off'; txt.textContent = '초기화 중'; }

    const ultraDot = document.getElementById('ultraDot');
    const ultraTxt = document.getElementById('ultraTxt');
    ultraDot.className = 'dot ' + (ultraReady ? 'on' : 'off');
    ultraTxt.textContent = ultraReady ? '초음파' : '초음파 대기';

    const telegramDot = document.getElementById('telegramDot');
    const telegramTxt = document.getElementById('telegramTxt');
    telegramDot.className = 'dot ' + (telegramEnabled ? 'on' : 'off');
    telegramTxt.textContent = telegramEnabled ? '텔레그램' : '알림 꺼짐';
  }

  function updateUltrasonic(distance, proximity, logs) {
    const distEl = document.getElementById('distanceVal');
    const proxEl = document.getElementById('proximityTxt');
    if (typeof distance === 'number') {
      distEl.textContent = distance >= 999 ? 'timeout' : distance.toFixed(1) + ' cm';
    } else {
      distEl.textContent = '-- cm';
    }
    distEl.classList.toggle('near', !!proximity);
    proxEl.textContent = proximity ? '접근 감지' : '대기';
    proxEl.className = 'ultra-state' + (proximity ? ' near' : '');

    const list = document.getElementById('ultraLog');
    if (!logs || !logs.length) return;
    list.innerHTML = logs.map(l => `
      <div class="ultra-item">
        <div>${l.time}</div>
        <div class="ultra-dist">${l.distance >= 999 ? 'timeout' : l.distance.toFixed(1) + ' cm'}</div>
        <div class="ultra-state ${l.detected ? 'near' : ''}">${l.note || (l.detected ? '감지' : '정상')}</div>
      </div>`).join('');
  }

  function showTrigger() {
    const banner = document.getElementById('triggerBanner');
    banner.classList.add('show');
    clearTimeout(triggerTimer);
    triggerTimer = setTimeout(() => banner.classList.remove('show'), 3000);
  }

  function renderSnaps(snaps) {
    const list = document.getElementById('snapList');
    if (!snaps.length) return;
    list.innerHTML = snaps.map(s => `
      <div class="snap-item">
        <img src="/snapshots/${s.filename}" alt="snap" onerror="this.style.visibility='hidden'">
        <div class="snap-meta">
          <div class="snap-weight">${s.weight} g</div>
          <div class="snap-time">${s.time}</div>
        </div>
      </div>`).join('');
  }

  // ── 카메라 상태 폴링 ──────────────────────────────────────
  function pollCam() {
    fetch('/status').then(r => r.json()).then(d => {
      const dot = document.getElementById('camDot');
      const txt = document.getElementById('camTxt');
      dot.className = 'dot ' + (d.cam_online ? 'on' : 'off');
      txt.textContent = d.cam_online ? '카메라' : '오프라인';
      const telegramDot = document.getElementById('telegramDot');
      const telegramTxt = document.getElementById('telegramTxt');
      telegramDot.className = 'dot ' + (d.telegram_enabled ? 'on' : 'off');
      telegramTxt.textContent = d.telegram_enabled ? '텔레그램' : '알림 꺼짐';
    }).catch(() => {});
  }
  pollCam(); setInterval(pollCam, 5000);

  // ── 컨트롤 ───────────────────────────────────────────────
  function updateThresholdLabel(v) {
    document.getElementById('thresholdVal').textContent = v + ' g';
  }

  function applyThreshold() {
    const v = document.getElementById('thresholdSlider').value;
    fetch(`/threshold/${v}`, { method: 'POST' })
      .then(r => r.json()).then(d => {
        if (d.ok) { lastThreshold = parseInt(v); alert(`임계값 ${v}g 설정 완료`); }
      });
  }

  function tare() {
    fetch('/tare', { method: 'POST' }).then(r => r.json())
      .then(d => alert(d.ok ? '영점 조정 완료' : '오류: ' + d.error));
  }

  function snapshotNow() {
    fetch('/snapshot-now', { method: 'POST' }).then(r => r.json())
      .then(d => { if (!d.ok) alert('스냅샷 실패'); });
  }

  function saveSettings() {
    const preSeconds = parseInt(document.getElementById('preSecondsSlider').value);
    const customMsg = document.getElementById('customMsg').value.trim();
    fetch('/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pre_seconds: preSeconds, custom_msg: customMsg })
    }).then(r => r.json()).then(d => {
      if (d.ok) alert(`저장 완료\n이전 영상: ${d.pre_event_seconds}초\n메시지: ${d.custom_msg || '(없음)'}`);
    });
  }
</script>
</body>
</html>
